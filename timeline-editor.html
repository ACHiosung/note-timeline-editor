<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note Timeline Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1b2a;
      color: #d0e8ff;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    /* ── TOOLBAR ── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px;
      background: #0a1628;
      border-bottom: 1px solid #1a3a5c;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .logo { font-weight: 700; font-size: 14px; color: #64b5f6; white-space: nowrap; }
    .btn {
      padding: 4px 12px;
      border-radius: 5px;
      border: none;
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-primary  { background: #1565c0; color: #fff; }
    .btn-primary:hover  { background: #1976d2; }
    .btn-success  { background: #1b5e20; color: #a5d6a7; }
    .btn-success:hover:not(:disabled) { background: #2e7d32; }
    .btn-success:disabled { opacity: 0.4; cursor: default; }
    .btn-secondary { background: #1a3a5c; color: #90caf9; }
    .btn-secondary:hover { background: #1e4976; }
    .tag {
      background: #112244; color: #90caf9;
      padding: 3px 8px; border-radius: 4px;
      font-size: 10px; white-space: nowrap;
    }
    .tag-hl { background: #1a3a5c; color: #64b5f6; font-weight: 700; }
    #play-time { cursor: ns-resize; }
    #info-pos { margin-left: auto; }

    /* ── MAIN ── */
    #main-area {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; min-height: 0;
    }

    /* Note canvas */
    #note-canvas-wrapper {
      flex: 1; position: relative; overflow: hidden; min-height: 0;
    }
    #note-canvas { display: block; background: #060f1a; }

    /* ── TIMELINE AREA ── */
    #timeline-area {
      height: 136px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #0a1628;
      border-top: 2px solid #1a3a5c;
    }
    #tl-main { flex: 1; display: flex; min-height: 0; }

    /* Side labels */
    #tl-labels {
      width: 50px; flex-shrink: 0;
      display: flex; flex-direction: column;
      border-right: 1px solid #132030;
    }
    .tl-label-cell {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
      writing-mode: vertical-lr; transform: rotate(180deg);
    }
    .tl-label-cell:not(:last-child) { border-bottom: 1px solid #132030; }
    .tl-label-normal { color: #42a5f5; }
    .tl-label-drag   { color: #ffa726; }

    /* Scrollable canvases */
    #tl-scroll {
      flex: 1; overflow-x: auto; overflow-y: hidden;
      display: flex; flex-direction: column;
    }
    #tl-scroll::-webkit-scrollbar { height: 5px; }
    #tl-scroll::-webkit-scrollbar-track { background: #0a1628; }
    #tl-scroll::-webkit-scrollbar-thumb { background: #1e3c5e; border-radius: 3px; }
    #tl-inner { display: flex; flex-direction: column; }
    #normal-tl-canvas, #drag-tl-canvas { display: block; flex-shrink: 0; }
    #tl-divider { height: 1px; background: #0e2040; flex-shrink: 0; }

    /* Zoom controls */
    #tl-controls {
      height: 22px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 6px; gap: 4px;
      border-top: 1px solid #0e2040;
    }
    #tl-controls .btn { padding: 1px 7px; font-size: 11px; }

    /* ── STATUS BAR ── */
    #status-bar {
      display: flex; gap: 14px;
      padding: 2px 14px;
      background: #060f1a; border-top: 1px solid #1a3a5c;
      font-size: 10px; color: #5a8abf; flex-shrink: 0;
    }
    #status-drag { color: #81c784; }
  </style>
</head>
<body>

<div id="toolbar">
  <span class="logo">🎵 Note Timeline Editor</span>
  <label class="btn btn-primary" style="cursor:pointer;">
    📂 JSON 로드
    <input type="file" id="json-upload" accept=".json" style="display:none;">
  </label>
  <button class="btn btn-success" id="export-btn" disabled>💾 JSON 저장</button>
  <span class="tag" id="info-notes">노트: —</span>
  <span class="tag" id="info-bars">바: —</span>
  <span class="tag tag-hl" id="info-selected">선택: —</span>
  <button class="btn btn-secondary" id="snap-btn">스냅 ✓</button>
  <span class="tag" id="info-pos">마우스: —</span>
  <span style="width:1px;height:20px;background:#1a3a5c;flex-shrink:0;margin:0 2px;"></span>
  <label class="btn btn-secondary" style="cursor:pointer;" title="재생할 음악 파일 선택">
    🎵 음악 로드
    <input type="file" id="music-upload" accept="audio/*" style="display:none;">
  </label>
  <span class="tag" id="music-status">음악 없음</span>
  <button class="btn btn-success" id="play-btn" disabled title="재생 / 정지">▶ 재생</button>
  <button class="btn btn-secondary" id="reset-btn" disabled title="처음으로 되감기">⏮</button>
  <button class="btn btn-secondary" id="tap-sound-btn" title="노트 타이밍에 효과음 재생">🥁 탭음 ✗</button>
  <span class="tag tag-hl" id="play-time" title="휠로 재생 시간 조절 (0.1s 단위)&#10;어디서든 Shift+휠도 가능">—</span>
</div>

<div id="main-area">
  <div id="note-canvas-wrapper">
    <canvas id="note-canvas"></canvas>
  </div>

  <div id="timeline-area">
    <div id="tl-main">
      <div id="tl-labels">
        <div class="tl-label-cell tl-label-normal">일반/롱</div>
        <div class="tl-label-cell tl-label-drag">드래그</div>
      </div>
      <div id="tl-scroll">
        <div id="tl-inner">
          <canvas id="normal-tl-canvas"></canvas>
          <div id="tl-divider"></div>
          <canvas id="drag-tl-canvas"></canvas>
        </div>
      </div>
    </div>
    <div id="tl-controls">
      <button class="btn btn-secondary" id="tl-zoom-out">−</button>
      <button class="btn btn-secondary" id="tl-zoom-in">+</button>
    </div>
  </div>
</div>

<div id="status-bar">
  <span id="status-msg">JSON 파일을 로드하면 타임라인과 노트 에디터가 활성화됩니다.</span>
  <span id="status-drag"></span>
</div>

<script>
// ═══════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════
const WORLD = { xMin: -7, xMax: 7, yMin: -3.5, yMax: 3.5 };
const NOTE_R = 18;
const NOTE_HIT_TOLERANCE = 4;
const TL_PAD = 14;
const TL_BAR_Y = 12;      // bar top offset within each timeline canvas
const TL_BAR_H = 28;      // bar height
const TL_BAR_W = 3;       // thin tick bar width (px)
const TL_HIT_W = 14;      // click hit area width (±7 px around center)
const TL_DOT_R = 4;       // top marker dot radius
const TL_PX_PER_SEC = 60;
const TIME_GROUP_PRECISION = 6;
// Bar lightness constants
const BAR_BASE_L = 22;
const BAR_L_PER_NOTE = 3;
const BAR_MAX_L_BONUS = 15;

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const S = {
  rawNotes: null,
  normalBars: [],      // [{time, notes:[...]}]  – type 0/1/-1
  dragChains: [],      // [{startTime, notes:[...]}]  – type 2 chains
  selectedNormalBar: -1,
  selectedDragChain: -1,
  selectedNoteIdx: -1, // index of focused note within the current bar/chain
  dragging: null,      // {noteRef, startMx, startMy, startX, startY}
  snapEnabled: true,
  tlZoom: 1,
  multiSelectedBars: new Set(), // indices of bars in rubber-band selection
  copiedBarNotes: null,         // [{count, notes:[{type,x,y}]}] clipboard
  pasteOverlayBars: new Map(),  // barIndex → 'ok'|'error' after Ctrl+V
  tlDragSelect: null,           // {startX, currentX} during rubber-band drag
  undoStack: [],                // [{id, x, y}[]] position snapshots
};

// ═══════════════════════════════════════════════
//  DOM REFS
// ═══════════════════════════════════════════════
const noteCanvasEl  = document.getElementById('note-canvas');
const noteCtx       = noteCanvasEl.getContext('2d');
const normalTlEl    = document.getElementById('normal-tl-canvas');
const normalTlCtx   = normalTlEl.getContext('2d');
const dragTlEl      = document.getElementById('drag-tl-canvas');
const dragTlCtx     = dragTlEl.getContext('2d');
const noteWrapper   = document.getElementById('note-canvas-wrapper');
const tlScroll      = document.getElementById('tl-scroll');
const tlInner       = document.getElementById('tl-inner');

// ═══════════════════════════════════════════════
//  NOTE TYPE HELPERS
// ═══════════════════════════════════════════════
function noteColor(type) {
  switch (type) {
    case  0: return '#42a5f5';
    case  1: return '#66bb6a';
    case  2: return '#ffa726';
    case -1: return '#ef5350';
    default: return '#b0bec5';
  }
}
function noteLabel(type) {
  switch (type) {
    case  0: return '일반';
    case  1: return '롱';
    case  2: return '드래그';
    case -1: return '엔드';
    default: return '?';
  }
}

// ═══════════════════════════════════════════════
//  JSON LOAD
// ═══════════════════════════════════════════════
document.getElementById('json-upload').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      const raw = Array.isArray(data) ? data : (data.notes || []);
      // Determine a safe base for auto-generated IDs (avoid collisions with existing IDs)
      const maxExistingId = raw.reduce((m, n) => (n.id != null ? Math.max(m, n.id) : m), 0);
      let nextAutoId = maxExistingId + 1;
      S.rawNotes = raw.map(n => {
        const note = {
          id:       n.id ?? nextAutoId++,
          type:     n.type,
          time:     n.time,
          position: { x: n.position.x, y: n.position.y },
          duration: n.duration,
        };
        if (n.type === 2) {
          // New format: uses nextId
          note.nextId = (n.nextId !== undefined) ? n.nextId : null;
        } else {
          note.endPosition = n.endPosition
            ? { x: n.endPosition.x, y: n.endPosition.y }
            : { x: 0, y: 0 };
        }
        return note;
      });
      buildData();
      document.getElementById('export-btn').disabled = false;
      document.getElementById('status-msg').textContent =
        `"${file.name}" 로드 완료 — 노트 ${S.rawNotes.length}개 / 바 ${S.normalBars.length}개 / 드래그체인 ${S.dragChains.length}개`;
      renderAll();
    } catch (err) {
      alert('JSON 파싱 오류: ' + err.message);
    }
  };
  reader.readAsText(file);
});

// ═══════════════════════════════════════════════
//  DATA BUILDING
// ═══════════════════════════════════════════════
function buildData() {
  buildNormalBars();
  buildDragChains();
  S.selectedNormalBar = -1;
  S.selectedDragChain = -1;
  S.selectedNoteIdx   = -1;
  S.multiSelectedBars = new Set();
  S.copiedBarNotes    = null;
  S.pasteOverlayBars  = new Map();
  S.tlDragSelect      = null;
  S.undoStack         = [];
  document.getElementById('info-notes').textContent = `노트: ${S.rawNotes.length}`;
  document.getElementById('info-bars').textContent  =
    `바: ${S.normalBars.length} / 체인: ${S.dragChains.length}`;
  document.getElementById('info-selected').textContent = '선택: —';
}

function buildNormalBars() {
  const map = new Map();
  S.rawNotes
    .filter(n => n.type !== 2)
    .forEach(note => {
      const key = note.time.toFixed(TIME_GROUP_PRECISION);
      if (!map.has(key)) map.set(key, { time: note.time, notes: [] });
      map.get(key).notes.push(note);
    });
  S.normalBars = Array.from(map.values()).sort((a, b) => a.time - b.time);
}

function buildDragChains() {
  const dragNotes = S.rawNotes.filter(n => n.type === 2);
  // IDs that appear as nextId of some drag note → those are NOT chain starters
  const referencedIds = new Set(
    dragNotes.map(n => n.nextId).filter(id => id != null)
  );
  const starters = dragNotes.filter(n => !referencedIds.has(n.id));
  const noteById = new Map(S.rawNotes.map(n => [n.id, n]));

  S.dragChains = starters.map(starter => {
    const notes = [];
    const seen = new Set();
    let cur = starter;
    while (cur && !seen.has(cur.id)) {
      seen.add(cur.id);
      notes.push(cur);
      cur = (cur.nextId != null) ? (noteById.get(cur.nextId) || null) : null;
    }
    return { startTime: starter.time, notes };
  }).sort((a, b) => a.startTime - b.startTime);
}

// ═══════════════════════════════════════════════
//  TIMELINE GEOMETRY
// ═══════════════════════════════════════════════
function tlPxPerSec() { return TL_PX_PER_SEC * S.tlZoom; }

function tlTotalWidth() {
  let maxT = 0;
  S.normalBars.forEach(b => { if (b.time > maxT) maxT = b.time; });
  S.dragChains.forEach(c => {
    const lastT = c.notes[c.notes.length - 1].time;
    if (lastT > maxT) maxT = lastT;
  });
  return Math.max(tlScroll.clientWidth, TL_PAD * 2 + maxT * tlPxPerSec() + 40);
}

function tlTimeToX(t) { return TL_PAD + t * tlPxPerSec(); }

function normalBarWidth(_i) { return TL_BAR_W; } // kept for reference only

function dragChainBarWidth(_i) { return TL_BAR_W; } // kept for reference only

// ═══════════════════════════════════════════════
//  TIMELINE RENDER HELPERS
// ═══════════════════════════════════════════════
function drawTimeAxis(ctx, W, bars, chains) {
  // Determine max time across both timelines
  let maxT = 1;
  bars.forEach(b => { if (b.time > maxT) maxT = b.time; });
  chains.forEach(c => {
    const lt = c.notes[c.notes.length - 1].time;
    if (lt > maxT) maxT = lt;
  });
  maxT += 1;

  const axisY = TL_BAR_Y + TL_BAR_H + 3;
  ctx.strokeStyle = '#132030';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(TL_PAD, axisY);
  ctx.lineTo(W - TL_PAD, axisY);
  ctx.stroke();

  ctx.font = '8px Segoe UI';
  ctx.textAlign = 'center';
  for (let t = 0; t <= maxT; t += 1) {
    const tx = tlTimeToX(t);
    if (tx > W) break;
    ctx.strokeStyle = '#132030';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(tx, axisY);
    ctx.lineTo(tx, axisY + 3);
    ctx.stroke();
    if (t % 5 === 0) {
      ctx.fillStyle = '#2a5a7a';
      ctx.fillText(t + 's', tx, axisY + 12);
    }
  }
}

// ═══════════════════════════════════════════════
//  NORMAL TIMELINE RENDER
// ═══════════════════════════════════════════════
function renderNormalTimeline() {
  const W = normalTlEl.width;
  const H = normalTlEl.height;
  const ctx = normalTlCtx;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0, 0, W, H);

  if (!S.normalBars.length) {
    ctx.fillStyle = '#2a4a6a';
    ctx.font = '10px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('일반/롱 노트 없음', W / 2, H / 2 + 3);
    return;
  }

  drawTimeAxis(ctx, W, S.normalBars, S.dragChains);

  S.normalBars.forEach((bar, i) => {
    const cx = tlTimeToX(bar.time);   // center x
    const bx = cx - TL_BAR_W / 2;
    const sel = i === S.selectedNormalBar;

    // Priority: paste overlay > single selection > multi-selection > default
    let color;
    if (S.pasteOverlayBars.has(i)) {
      color = S.pasteOverlayBars.get(i) === 'ok' ? '#4dd0e1' : '#ef5350';
    } else if (sel) {
      color = '#64b5f6';
    } else if (S.multiSelectedBars.has(i)) {
      color = '#ffd54f';
    } else {
      color = `hsl(210,70%,${BAR_BASE_L + Math.min(bar.notes.length * BAR_L_PER_NOTE, BAR_MAX_L_BONUS)}%)`;
    }

    // Thin vertical tick
    ctx.fillStyle = color;
    ctx.fillRect(bx, TL_BAR_Y, TL_BAR_W, TL_BAR_H);

    // Small dot cap at top showing first note type color
    const dotColor = noteColor(bar.notes[0].type);
    ctx.beginPath();
    ctx.arc(cx, TL_BAR_Y - 1, TL_DOT_R, 0, Math.PI * 2);
    ctx.fillStyle = sel ? dotColor : dotColor;
    ctx.fill();
    if (sel) {
      ctx.strokeStyle = '#e3f2fd';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Count label above dot
    ctx.fillStyle = sel ? '#e3f2fd' : '#4a8ab8';
    ctx.font = `bold 8px Segoe UI`;
    ctx.textAlign = 'center';
    ctx.fillText(bar.notes.length, cx, TL_BAR_Y - TL_DOT_R - 3);
  });

  // Draw rubber-band selection rectangle
  if (S.tlDragSelect) {
    const x1 = Math.min(S.tlDragSelect.startX, S.tlDragSelect.currentX);
    const x2 = Math.max(S.tlDragSelect.startX, S.tlDragSelect.currentX);
    const ry = TL_BAR_Y - TL_DOT_R - 6;
    const rh = TL_BAR_H + TL_DOT_R + 10;
    ctx.fillStyle = 'rgba(100,181,246,0.12)';
    ctx.fillRect(x1, ry, x2 - x1, rh);
    ctx.strokeStyle = 'rgba(100,181,246,0.7)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.strokeRect(x1, ry, x2 - x1, rh);
    ctx.setLineDash([]);
  }

  // Multi-selection count badge
  if (S.multiSelectedBars.size > 1) {
    ctx.fillStyle = 'rgba(10,22,40,0.75)';
    ctx.fillRect(0, 0, W, 14);
    ctx.fillStyle = '#ffd54f';
    ctx.font = 'bold 9px Segoe UI';
    ctx.textAlign = 'left';
    ctx.fillText(`${S.multiSelectedBars.size}개 바 선택됨 — Ctrl+C 로 복사`, 8, 10);
  }

  // Playhead
  drawPlayhead(ctx, W, H);
}

// ═══════════════════════════════════════════════
//  DRAG TIMELINE RENDER
// ═══════════════════════════════════════════════
function renderDragTimeline() {
  const W = dragTlEl.width;
  const H = dragTlEl.height;
  const ctx = dragTlCtx;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0, 0, W, H);

  if (!S.dragChains.length) {
    ctx.fillStyle = '#3a2a0a';
    ctx.font = '10px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('드래그 체인 없음', W / 2, H / 2 + 3);
    return;
  }

  drawTimeAxis(ctx, W, S.normalBars, S.dragChains);

  S.dragChains.forEach((chain, i) => {
    const cx = tlTimeToX(chain.startTime);   // center x at chain start
    const bx = cx - TL_BAR_W / 2;
    const sel = i === S.selectedDragChain;
    const color = sel ? '#ffa726' : `hsl(35,70%,${BAR_BASE_L + Math.min(chain.notes.length * BAR_L_PER_NOTE, BAR_MAX_L_BONUS)}%)`;

    // Thin vertical tick
    ctx.fillStyle = color;
    ctx.fillRect(bx, TL_BAR_Y, TL_BAR_W, TL_BAR_H);

    // Small dot cap at top
    ctx.beginPath();
    ctx.arc(cx, TL_BAR_Y - 1, TL_DOT_R, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    if (sel) {
      ctx.strokeStyle = '#fff3e0';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // Chain length label above dot
    ctx.fillStyle = sel ? '#fff3e0' : '#8a5010';
    ctx.font = `bold 8px Segoe UI`;
    ctx.textAlign = 'center';
    ctx.fillText(chain.notes.length, cx, TL_BAR_Y - TL_DOT_R - 3);
  });

  // Playhead
  drawPlayhead(ctx, W, H);
}

// ═══════════════════════════════════════════════
//  NOTE CANVAS GEOMETRY
// ═══════════════════════════════════════════════
function worldToCanvas(wx, wy) {
  const W = noteCanvasEl.width;
  const H = noteCanvasEl.height;
  const px = (wx - WORLD.xMin) / (WORLD.xMax - WORLD.xMin) * W;
  const py = (1 - (wy - WORLD.yMin) / (WORLD.yMax - WORLD.yMin)) * H;
  return [px, py];
}

function canvasToWorld(cx, cy) {
  const W = noteCanvasEl.width;
  const H = noteCanvasEl.height;
  const wx = (cx / W) * (WORLD.xMax - WORLD.xMin) + WORLD.xMin;
  const wy = (1 - cy / H) * (WORLD.yMax - WORLD.yMin) + WORLD.yMin;
  return [wx, wy];
}

// ═══════════════════════════════════════════════
//  NOTE CANVAS RENDER
// ═══════════════════════════════════════════════
function renderNoteCanvas() {
  const ctx = noteCtx;
  const W = noteCanvasEl.width;
  const H = noteCanvasEl.height;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#060f1a';
  ctx.fillRect(0, 0, W, H);
  drawGrid(ctx, W, H);

  const hasNormal = S.selectedNormalBar >= 0 && S.normalBars.length > 0;
  const hasDrag   = S.selectedDragChain >= 0 && S.dragChains.length > 0;

  if (!hasNormal && !hasDrag) {
    ctx.fillStyle = '#1e4060';
    ctx.font = '14px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(
      (S.normalBars.length || S.dragChains.length)
        ? '타임라인에서 바를 클릭하면 노트가 표시됩니다'
        : 'JSON 파일을 로드하세요',
      W / 2, H / 2
    );
    return;
  }

  if (hasNormal) {
    const idx = S.selectedNormalBar;
    const bar = S.normalBars[idx];

    // Draw adjacent bars dimmed (left=blue tint, right=green tint)
    if (idx > 0)
      renderDimmedBarNotes(ctx, S.normalBars[idx - 1], 'left');
    if (idx < S.normalBars.length - 1)
      renderDimmedBarNotes(ctx, S.normalBars[idx + 1], 'right');

    renderNormalBarNotes(ctx, bar);
    // Overlay
    drawOverlay(ctx, W,
      `바 ${idx + 1} / ${S.normalBars.length}   |   시간: ${bar.time.toFixed(3)}s   |   노트: ${bar.notes.length}개`);
  } else {
    const chain = S.dragChains[S.selectedDragChain];
    renderDragChainNotes(ctx, chain);
    // Overlay
    drawOverlay(ctx, W,
      `드래그 체인 ${S.selectedDragChain + 1} / ${S.dragChains.length}   |   시작: ${chain.startTime.toFixed(3)}s   |   노드: ${chain.notes.length}개`);
  }
}

// Render an adjacent bar's notes with reduced opacity to indicate left or right neighbour
function renderDimmedBarNotes(ctx, bar, side) {
  const alpha = 0.18;
  const labelColor  = side === 'left' ? '#64b5f6' : '#66bb6a';
  const arrowLabel  = side === 'left' ? '◀ 이전' : '다음 ▶';
  const H = noteCanvasEl.height;

  bar.notes.forEach(note => {
    const [cx, cy] = worldToCanvas(note.position.x, note.position.y);
    const color = noteColor(note.type);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(cx, cy, NOTE_R, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#0d1b2a';
    ctx.font = 'bold 9px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(noteLabel(note.type), cx, cy + 3);
    ctx.restore();
  });

  // Direction label drawn once at the edge of the canvas
  if (bar.notes.length > 0) {
    const edgeX = side === 'left' ? 36 : noteCanvasEl.width - 36;
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.fillStyle = labelColor;
    ctx.font = 'bold 10px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(arrowLabel, edgeX, H / 2);
    ctx.restore();
  }
}

function drawOverlay(ctx, W, text) {
  ctx.fillStyle = 'rgba(10,22,40,0.75)';
  ctx.fillRect(0, 0, W, 24);
  ctx.fillStyle = '#64b5f6';
  ctx.font = '11px Segoe UI';
  ctx.textAlign = 'left';
  ctx.fillText(text, 10, 16);
}

function renderNormalBarNotes(ctx, bar) {
  bar.notes.forEach((note, idx) => {
    const [cx, cy] = worldToCanvas(note.position.x, note.position.y);
    const isDragging = S.dragging && S.dragging.noteRef === note;
    const isSelected = idx === S.selectedNoteIdx;
    const color = noteColor(note.type);

    ctx.save();
    ctx.shadowColor = color;
    ctx.shadowBlur = (isDragging || isSelected) ? 28 : 8;
    ctx.beginPath();
    ctx.arc(cx, cy, NOTE_R, 0, Math.PI * 2);
    ctx.fillStyle = (isDragging || isSelected) ? '#ffffff' : color;
    ctx.fill();
    ctx.strokeStyle = (isDragging || isSelected) ? color : 'rgba(255,255,255,0.4)';
    ctx.lineWidth = (isDragging || isSelected) ? 2.5 : 1.5;
    ctx.stroke();
    ctx.restore();

    if (isSelected) {
      // outer ring to make selection obvious
      ctx.save();
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.arc(cx, cy, NOTE_R + 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    ctx.fillStyle = (isDragging || isSelected) ? color : '#0d1b2a';
    ctx.font = 'bold 9px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(noteLabel(note.type), cx, cy + 3);

    ctx.fillStyle = '#5a9ad0';
    ctx.font = '10px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(`(${note.position.x.toFixed(2)}, ${note.position.y.toFixed(2)})`, cx, cy + NOTE_R + 13);
  });
}

function renderDragChainNotes(ctx, chain) {
  const notes = chain.notes;
  const DRAG_COLOR = '#ffa726';

  // Draw chain path lines first
  if (notes.length > 1) {
    ctx.save();
    ctx.strokeStyle = DRAG_COLOR;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.45;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    notes.forEach((note, i) => {
      const [cx, cy] = worldToCanvas(note.position.x, note.position.y);
      if (i === 0) ctx.moveTo(cx, cy);
      else ctx.lineTo(cx, cy);
    });
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();

    // Arrow heads along chain
    for (let i = 0; i < notes.length - 1; i++) {
      const [ax, ay] = worldToCanvas(notes[i].position.x, notes[i].position.y);
      const [bx, by] = worldToCanvas(notes[i + 1].position.x, notes[i + 1].position.y);
      const mx = (ax + bx) / 2;
      const my = (ay + by) / 2;
      const ang = Math.atan2(by - ay, bx - ax);
      ctx.save();
      ctx.translate(mx, my);
      ctx.rotate(ang);
      ctx.fillStyle = DRAG_COLOR;
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.moveTo(7, 0); ctx.lineTo(-5, -4); ctx.lineTo(-5, 4);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  // Draw node circles
  notes.forEach((note, idx) => {
    const [cx, cy] = worldToCanvas(note.position.x, note.position.y);
    const isDragging = S.dragging && S.dragging.noteRef === note;
    const isSelected = idx === S.selectedNoteIdx;

    ctx.save();
    ctx.shadowColor = DRAG_COLOR;
    ctx.shadowBlur = (isDragging || isSelected) ? 28 : 10;
    ctx.beginPath();
    ctx.arc(cx, cy, NOTE_R, 0, Math.PI * 2);
    ctx.fillStyle = (isDragging || isSelected) ? '#ffffff' : DRAG_COLOR;
    ctx.fill();
    ctx.strokeStyle = (isDragging || isSelected) ? DRAG_COLOR : 'rgba(255,255,255,0.4)';
    ctx.lineWidth = (isDragging || isSelected) ? 2.5 : 1.5;
    ctx.stroke();
    ctx.restore();

    if (isSelected) {
      ctx.save();
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.7;
      ctx.beginPath();
      ctx.arc(cx, cy, NOTE_R + 5, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    // Sequence index inside
    ctx.fillStyle = (isDragging || isSelected) ? DRAG_COLOR : '#1a0800';
    ctx.font = `bold 10px Segoe UI`;
    ctx.textAlign = 'center';
    ctx.fillText(idx + 1, cx, cy + 4);

    // Coordinates below
    ctx.fillStyle = '#c07020';
    ctx.font = '10px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText(`(${note.position.x.toFixed(2)}, ${note.position.y.toFixed(2)})`, cx, cy + NOTE_R + 13);
  });
}

function drawGrid(ctx, W, H) {
  ctx.lineWidth = 0.5;
  for (let x = Math.ceil(WORLD.xMin); x <= Math.floor(WORLD.xMax); x++) {
    const [px] = worldToCanvas(x, 0);
    ctx.strokeStyle = x === 0 ? 'rgba(42,90,140,0.8)' : 'rgba(26,58,92,0.4)';
    ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, H); ctx.stroke();
    if (x !== 0) {
      ctx.fillStyle = 'rgba(42,90,140,0.5)';
      ctx.font = '9px Segoe UI'; ctx.textAlign = 'center';
      ctx.fillText(x, px, H - 4);
    }
  }
  for (let y = Math.ceil(WORLD.yMin); y <= Math.floor(WORLD.yMax); y++) {
    const [, py] = worldToCanvas(0, y);
    ctx.strokeStyle = y === 0 ? 'rgba(42,90,140,0.8)' : 'rgba(26,58,92,0.4)';
    ctx.beginPath(); ctx.moveTo(0, py); ctx.lineTo(W, py); ctx.stroke();
    if (y !== 0) {
      ctx.fillStyle = 'rgba(42,90,140,0.5)';
      ctx.font = '9px Segoe UI'; ctx.textAlign = 'left';
      ctx.fillText(y, 4, py + 3);
    }
  }
  const [ox, oy] = worldToCanvas(0, 0);
  ctx.strokeStyle = 'rgba(30,100,180,0.7)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(ox, 0); ctx.lineTo(ox, H);
  ctx.moveTo(0, oy); ctx.lineTo(W, oy);
  ctx.stroke();
  ctx.fillStyle = 'rgba(42,90,140,0.5)';
  ctx.font = '9px Segoe UI'; ctx.textAlign = 'left';
  ctx.fillText('0', ox + 4, oy - 4);
}

// ═══════════════════════════════════════════════
//  TIMELINE CLICK HANDLERS
// ═══════════════════════════════════════════════
normalTlEl.addEventListener('mousedown', e => {
  if (!S.normalBars.length) return;
  const rect = normalTlEl.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  // Check if clicking directly on a bar
  if (my >= TL_BAR_Y - TL_DOT_R - 4 && my <= TL_BAR_Y + TL_BAR_H) {
    for (let i = 0; i < S.normalBars.length; i++) {
      const cx = tlTimeToX(S.normalBars[i].time);
      if (Math.abs(mx - cx) <= TL_HIT_W / 2) {
        S.selectedNormalBar = i;
        S.selectedDragChain = -1;
        S.selectedNoteIdx   = -1;
        S.dragging = null;
        S.multiSelectedBars = new Set([i]);
        S.tlDragSelect = null;
        document.getElementById('info-selected').textContent =
          `일반/롱 바 ${i + 1}번 (${S.normalBars[i].time.toFixed(2)}s, ${S.normalBars[i].notes.length}개)`;
        renderAll();
        return;
      }
    }
  }

  // Start rubber-band selection
  S.tlDragSelect = { startX: mx, currentX: mx };
  S.multiSelectedBars = new Set();
  S.selectedNormalBar = -1;
  renderNormalTimeline();
});

dragTlEl.addEventListener('click', e => {
  if (!S.dragChains.length) return;
  const rect = dragTlEl.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  if (my < TL_BAR_Y - TL_DOT_R - 4 || my > TL_BAR_Y + TL_BAR_H) return;

  for (let i = 0; i < S.dragChains.length; i++) {
    const cx = tlTimeToX(S.dragChains[i].startTime);
    if (Math.abs(mx - cx) <= TL_HIT_W / 2) {
      S.selectedDragChain = i;
      S.selectedNormalBar = -1;
      S.selectedNoteIdx   = -1;
      S.dragging = null;
      S.multiSelectedBars = new Set();
      document.getElementById('info-selected').textContent =
        `드래그 체인 ${i + 1}번 (${S.dragChains[i].startTime.toFixed(2)}s, ${S.dragChains[i].notes.length}개 노드)`;
      renderAll();
      return;
    }
  }
});

// ═══════════════════════════════════════════════
//  NOTE CANVAS INTERACTION
// ═══════════════════════════════════════════════
function getDisplayNotes() {
  if (S.selectedNormalBar >= 0 && S.normalBars.length > 0)
    return S.normalBars[S.selectedNormalBar].notes;
  if (S.selectedDragChain >= 0 && S.dragChains.length > 0)
    return S.dragChains[S.selectedDragChain].notes;
  return [];
}

noteCanvasEl.addEventListener('mousedown', e => {
  const notes = getDisplayNotes();
  if (!notes.length) return;
  const [mx, my] = mouseOnNote(e);
  for (const note of notes) {
    const [cx, cy] = worldToCanvas(note.position.x, note.position.y);
    if (Math.hypot(mx - cx, my - cy) <= NOTE_R + NOTE_HIT_TOLERANCE) {
      S.dragging = {
        noteRef: note,
        startMx: mx, startMy: my,
        startX: note.position.x, startY: note.position.y,
      };
      noteCanvasEl.style.cursor = 'grabbing';
      break;
    }
  }
});

// Throttle mouse-position DOM update via requestAnimationFrame
let infoPosUpdatePending = false;
function scheduleInfoPosUpdate(text) {
  if (infoPosUpdatePending) return;
  infoPosUpdatePending = true;
  requestAnimationFrame(() => {
    document.getElementById('info-pos').textContent = text;
    infoPosUpdatePending = false;
  });
}

noteCanvasEl.addEventListener('mousemove', e => {
  const [mx, my] = mouseOnNote(e);
  const [wx, wy] = canvasToWorld(mx, my);
  scheduleInfoPosUpdate(`마우스: (${wx.toFixed(2)}, ${wy.toFixed(2)})`);

  if (!S.dragging) {
    const notes = getDisplayNotes();
    const hover = notes.some(note => {
      const [cx, cy] = worldToCanvas(note.position.x, note.position.y);
      return Math.hypot(mx - cx, my - cy) <= NOTE_R + NOTE_HIT_TOLERANCE;
    });
    noteCanvasEl.style.cursor = hover ? 'grab' : 'crosshair';
    return;
  }

  const W = noteCanvasEl.width;
  const H = noteCanvasEl.height;
  const dxPx = mx - S.dragging.startMx;
  const dyPx = my - S.dragging.startMy;
  const dwx =  (dxPx / W) * (WORLD.xMax - WORLD.xMin);
  const dwy = -(dyPx / H) * (WORLD.yMax - WORLD.yMin);

  let newX = Math.max(WORLD.xMin, Math.min(WORLD.xMax, S.dragging.startX + dwx));
  let newY = Math.max(WORLD.yMin, Math.min(WORLD.yMax, S.dragging.startY + dwy));

  if (S.snapEnabled) {
    newX = Math.round(newX * 2) / 2;
    newY = Math.round(newY * 2) / 2;
  }

  S.dragging.noteRef.position.x = newX;
  S.dragging.noteRef.position.y = newY;

  document.getElementById('status-drag').textContent =
    `드래그 중 → (${newX.toFixed(2)}, ${newY.toFixed(2)})`;

  renderNoteCanvas();
});

noteCanvasEl.addEventListener('mouseup', () => endDrag());
noteCanvasEl.addEventListener('mouseleave', () => {
  if (S.dragging) endDrag();
  document.getElementById('info-pos').textContent = '마우스: —';
});

function endDrag() {
  if (!S.dragging) return;
  const note = S.dragging.noteRef;
  // Only push undo if position actually changed
  if (note.position.x !== S.dragging.startX || note.position.y !== S.dragging.startY) {
    // Temporarily restore original to capture pre-change state, then reapply
    const finalX = note.position.x;
    const finalY = note.position.y;
    note.position.x = S.dragging.startX;
    note.position.y = S.dragging.startY;
    pushUndo();
    note.position.x = finalX;
    note.position.y = finalY;
  }
  document.getElementById('status-drag').textContent =
    `저장됨 ✓ → (${note.position.x.toFixed(2)}, ${note.position.y.toFixed(2)})`;
  S.dragging = null;
  noteCanvasEl.style.cursor = 'crosshair';
  renderNoteCanvas();
}

function mouseOnNote(e) {
  const rect = noteCanvasEl.getBoundingClientRect();
  return [e.clientX - rect.left, e.clientY - rect.top];
}

// ═══════════════════════════════════════════════
//  UNDO
// ═══════════════════════════════════════════════
const UNDO_MAX = 50;

function pushUndo() {
  if (!S.rawNotes) return;
  const snap = S.rawNotes.map(n => ({ id: n.id, x: n.position.x, y: n.position.y }));
  S.undoStack.push(snap);
  if (S.undoStack.length > UNDO_MAX) S.undoStack.shift();
}

function applyUndo() {
  if (!S.undoStack.length) return;
  const snap = S.undoStack.pop();
  const byId = new Map(snap.map(s => [s.id, s]));
  S.rawNotes.forEach(n => {
    const s = byId.get(n.id);
    if (s) { n.position.x = s.x; n.position.y = s.y; }
  });
  S.pasteOverlayBars = new Map();
  document.getElementById('status-msg').textContent =
    `↩ 실행 취소 (남은 스택: ${S.undoStack.length})`;
  renderAll();
}

// ═══════════════════════════════════════════════
//  KEYBOARD NAVIGATION & NOTE ADJUSTMENT
// ═══════════════════════════════════════════════

function scrollTimelineToSelected() {
  if (S.selectedNormalBar >= 0 && S.normalBars.length > 0) {
    const cx = tlTimeToX(S.normalBars[S.selectedNormalBar].time);
    tlScroll.scrollLeft = Math.max(0, cx - tlScroll.clientWidth / 2);
  } else if (S.selectedDragChain >= 0 && S.dragChains.length > 0) {
    const cx = tlTimeToX(S.dragChains[S.selectedDragChain].startTime);
    tlScroll.scrollLeft = Math.max(0, cx - tlScroll.clientWidth / 2);
  }
}

// Helper: get notes array of the currently selected bar or chain
function getSelectedBarNotes() {
  if (S.selectedNormalBar >= 0 && S.normalBars.length > 0)
    return S.normalBars[S.selectedNormalBar].notes;
  if (S.selectedDragChain >= 0 && S.dragChains.length > 0)
    return S.dragChains[S.selectedDragChain].notes;
  return null;
}

// Helper: update info-selected label
function updateInfoSelected() {
  if (S.selectedNormalBar >= 0 && S.normalBars.length > 0) {
    const bar = S.normalBars[S.selectedNormalBar];
    const notePart = S.selectedNoteIdx >= 0
      ? `   노트 ${S.selectedNoteIdx + 1}/${bar.notes.length} 선택됨`
      : '';
    document.getElementById('info-selected').textContent =
      `일반/롱 바 ${S.selectedNormalBar + 1}번 (${bar.time.toFixed(2)}s, ${bar.notes.length}개)${notePart}`;
  } else if (S.selectedDragChain >= 0 && S.dragChains.length > 0) {
    const chain = S.dragChains[S.selectedDragChain];
    const notePart = S.selectedNoteIdx >= 0
      ? `   노드 ${S.selectedNoteIdx + 1}/${chain.notes.length} 선택됨`
      : '';
    document.getElementById('info-selected').textContent =
      `드래그 체인 ${S.selectedDragChain + 1}번 (${chain.startTime.toFixed(2)}s, ${chain.notes.length}개 노드)${notePart}`;
  }
}

// Shared A/D navigation logic
function handleShiftNav(forward) {
  if (S.selectedNormalBar >= 0 && S.normalBars.length > 0) {
    const bar = S.normalBars[S.selectedNormalBar];
    if (bar.notes.length > 0) {
      if (S.selectedNoteIdx < 0) {
        S.selectedNoteIdx = forward ? 0 : bar.notes.length - 1;
      } else if (forward && S.selectedNoteIdx < bar.notes.length - 1) {
        S.selectedNoteIdx++;
      } else if (!forward && S.selectedNoteIdx > 0) {
        S.selectedNoteIdx--;
      } else {
        const newIdx = forward
          ? Math.min(S.selectedNormalBar + 1, S.normalBars.length - 1)
          : Math.max(S.selectedNormalBar - 1, 0);
        if (newIdx === S.selectedNormalBar) return;
        S.selectedNormalBar = newIdx;
        const newBar = S.normalBars[newIdx];
        S.selectedNoteIdx = forward ? 0 : newBar.notes.length - 1;
        scrollTimelineToSelected();
      }
    } else {
      const newIdx = forward
        ? Math.min(S.selectedNormalBar + 1, S.normalBars.length - 1)
        : Math.max(S.selectedNormalBar - 1, 0);
      if (newIdx === S.selectedNormalBar) return;
      S.selectedNormalBar = newIdx;
      S.selectedNoteIdx = -1;
      scrollTimelineToSelected();
    }
    updateInfoSelected();
    renderAll();

  } else if (S.selectedDragChain >= 0 && S.dragChains.length > 0) {
    const chain = S.dragChains[S.selectedDragChain];
    if (chain.notes.length > 0) {
      if (S.selectedNoteIdx < 0) {
        S.selectedNoteIdx = forward ? 0 : chain.notes.length - 1;
      } else if (forward && S.selectedNoteIdx < chain.notes.length - 1) {
        S.selectedNoteIdx++;
      } else if (!forward && S.selectedNoteIdx > 0) {
        S.selectedNoteIdx--;
      } else {
        const newIdx = forward
          ? Math.min(S.selectedDragChain + 1, S.dragChains.length - 1)
          : Math.max(S.selectedDragChain - 1, 0);
        if (newIdx === S.selectedDragChain) return;
        S.selectedDragChain = newIdx;
        const newChain = S.dragChains[newIdx];
        S.selectedNoteIdx = forward ? 0 : newChain.notes.length - 1;
        scrollTimelineToSelected();
      }
    } else {
      const newIdx = forward
        ? Math.min(S.selectedDragChain + 1, S.dragChains.length - 1)
        : Math.max(S.selectedDragChain - 1, 0);
      if (newIdx === S.selectedDragChain) return;
      S.selectedDragChain = newIdx;
      S.selectedNoteIdx = -1;
      scrollTimelineToSelected();
    }
    updateInfoSelected();
    renderAll();
  }
}

// ── document-level rubber-band drag handlers ──────────────────────
document.addEventListener('mousemove', e => {
  if (!S.tlDragSelect) return;
  const rect = normalTlEl.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  S.tlDragSelect.currentX = mx;
  const x1 = Math.min(S.tlDragSelect.startX, S.tlDragSelect.currentX);
  const x2 = Math.max(S.tlDragSelect.startX, S.tlDragSelect.currentX);
  S.multiSelectedBars = new Set();
  S.normalBars.forEach((bar, i) => {
    const cx = tlTimeToX(bar.time);
    if (cx >= x1 && cx <= x2) S.multiSelectedBars.add(i);
  });
  renderNormalTimeline();
});

document.addEventListener('mouseup', e => {
  if (!S.tlDragSelect) return;
  S.tlDragSelect = null;
  const count = S.multiSelectedBars.size;
  if (count === 1) {
    const idx = [...S.multiSelectedBars][0];
    S.selectedNormalBar = idx;
    document.getElementById('info-selected').textContent =
      `일반/롱 바 ${idx + 1}번 (${S.normalBars[idx].time.toFixed(2)}s, ${S.normalBars[idx].notes.length}개)`;
    renderAll();
  } else if (count > 1) {
    const sorted = [...S.multiSelectedBars].sort((a, b) => a - b);
    S.selectedNormalBar = sorted[0];
    document.getElementById('info-selected').textContent =
      `바 ${count}개 선택됨 (${S.normalBars[sorted[0]].time.toFixed(2)}s ~ ${S.normalBars[sorted[sorted.length - 1]].time.toFixed(2)}s)`;
    renderAll();
  } else {
    renderNormalTimeline();
  }
});

// ── document-level mousedown: clear paste overlay on any click ────
document.addEventListener('mousedown', () => {
  if (S.pasteOverlayBars.size > 0) {
    S.pasteOverlayBars = new Map();
    renderNormalTimeline();
  }
});

// ── keydown: Ctrl+Z / Ctrl+C / Ctrl+V / A/D navigation + Arrow key note adjustment ──
document.addEventListener('keydown', e => {
  const tag = e.target && e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable) return;

  // ── Ctrl+Z: undo ────────────────────────────────────────────────
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    applyUndo();
    return;
  }

  // ── Ctrl+C: copy selected normal bars ──────────────────────────
  if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
    const selection = S.multiSelectedBars.size > 0
      ? [...S.multiSelectedBars].sort((a, b) => a - b)
      : (S.selectedNormalBar >= 0 ? [S.selectedNormalBar] : []);
    if (selection.length > 0 && S.normalBars.length > 0) {
      S.copiedBarNotes = selection.map(i => {
        const bar = S.normalBars[i];
        return {
          count: bar.notes.length,
          notes: bar.notes.map(n => ({ type: n.type, x: n.position.x, y: n.position.y })),
        };
      });
      document.getElementById('status-msg').textContent =
        `📋 바 ${selection.length}개 복사됨`;
    }
    return;
  }

  // ── Ctrl+V: paste copied bars starting from selected bar ────────
  if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
    if (!S.copiedBarNotes || !S.normalBars.length) return;
    const startIdx = S.multiSelectedBars.size > 0
      ? Math.min(...S.multiSelectedBars)
      : S.selectedNormalBar;
    if (startIdx < 0) return;
    e.preventDefault();

    pushUndo();
    S.pasteOverlayBars = new Map();
    S.copiedBarNotes.forEach((copied, offset) => {
      const targetIdx = startIdx + offset;
      if (targetIdx >= S.normalBars.length) return;
      const target = S.normalBars[targetIdx];
      const compatible =
        target.notes.length === copied.count &&
        target.notes.every((n, j) => n.type === copied.notes[j].type);
      if (compatible) {
        target.notes.forEach((n, j) => {
          n.position.x = copied.notes[j].x;
          n.position.y = copied.notes[j].y;
        });
        S.pasteOverlayBars.set(targetIdx, 'ok');
      } else {
        S.pasteOverlayBars.set(targetIdx, 'error');
      }
    });
    const okCount  = [...S.pasteOverlayBars.values()].filter(v => v === 'ok').length;
    const errCount = [...S.pasteOverlayBars.values()].filter(v => v === 'error').length;
    document.getElementById('status-msg').textContent =
      `붙여넣기 완료 — 성공 ${okCount}개 / 불일치 ${errCount}개`;
    renderAll();
    return;
  }

  // ── A / D: navigate bars / cycle through notes ──────────────────
  if (e.key === 'a' || e.key === 'A' || e.key === 'd' || e.key === 'D') {
    if (e.ctrlKey || e.metaKey) return;
    const forward = e.key === 'd' || e.key === 'D';
    e.preventDefault();
    handleShiftNav(forward);
    return;
  }

  // ── Space: play from 1s before selected bar ─────────────────────
  if (e.key === ' ') {
    if (!audioBuffer) return;
    e.preventDefault();
    if (S.selectedNormalBar >= 0 && S.normalBars.length > 0) {
      const barTime = S.normalBars[S.selectedNormalBar].time;
      const seekTo  = Math.max(0, barTime - 1);
      if (isPlaying) stopPlayback(false);
      playbackOffset  = seekTo;
      currentPlayTime = seekTo;
      document.getElementById('play-time').textContent = seekTo.toFixed(2) + 's';
      startPlayback();
    } else {
      if (isPlaying) stopPlayback(false);
      else           startPlayback();
    }
    return;
  }

  const isArrow = e.key === 'ArrowLeft' || e.key === 'ArrowRight'
               || e.key === 'ArrowUp'   || e.key === 'ArrowDown';
  if (!isArrow) return;

  const notes = getSelectedBarNotes();
  if (notes && S.selectedNoteIdx >= 0 && S.selectedNoteIdx < notes.length) {
    e.preventDefault();
    pushUndo();
    const step = S.snapEnabled ? 0.5 : 0.1;
    const note = notes[S.selectedNoteIdx];
    if (e.key === 'ArrowLeft')  note.position.x = Math.max(WORLD.xMin, note.position.x - step);
    if (e.key === 'ArrowRight') note.position.x = Math.min(WORLD.xMax, note.position.x + step);
    if (e.key === 'ArrowUp')    note.position.y = Math.min(WORLD.yMax, note.position.y + step);
    if (e.key === 'ArrowDown')  note.position.y = Math.max(WORLD.yMin, note.position.y - step);
    document.getElementById('status-drag').textContent =
      `키 조정 → (${note.position.x.toFixed(2)}, ${note.position.y.toFixed(2)})`;
    updateInfoSelected();
    renderNoteCanvas();
  }
});

// ═══════════════════════════════════════════════
//  TIMELINE HORIZONTAL SCROLL & ZOOM VIA MOUSE WHEEL
// ═══════════════════════════════════════════════
document.addEventListener('wheel', e => {
  // Ignore events that originate inside text inputs
  const tag = e.target && e.target.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || (e.target && e.target.isContentEditable)) return;

  // Wheel on the play-time badge → seek playback position (±0.1 s per notch)
  if (e.target && e.target.id === 'play-time') {
    e.preventDefault();
    seekByDelta((e.deltaY > 0 ? 1 : -1) * WHEEL_STEP);
    return;
  }

  // Shift+Wheel anywhere → seek playback position
  if (e.shiftKey) {
    e.preventDefault();
    seekByDelta((e.deltaY > 0 ? 1 : -1) * WHEEL_STEP);
    return;
  }

  e.preventDefault();

  if (e.ctrlKey || e.metaKey) {
    // Ctrl+scroll → zoom the timeline
    if (e.deltaY < 0) {
      S.tlZoom = Math.min(S.tlZoom * 1.1, 12);
    } else if (e.deltaY > 0) {
      S.tlZoom = Math.max(S.tlZoom / 1.1, 0.2);
    }
    resizeTimelines();
    renderNormalTimeline();
    renderDragTimeline();
  } else {
    // Regular scroll → scroll the timeline horizontally
    tlScroll.scrollLeft += e.deltaY !== 0 ? e.deltaY : e.deltaX;
  }
}, { passive: false });

//  SNAP TOGGLE

document.getElementById('snap-btn').addEventListener('click', function () {
  S.snapEnabled = !S.snapEnabled;
  this.textContent = S.snapEnabled ? '스냅 ✓' : '스냅 ✗';
});

// ═══════════════════════════════════════════════
//  EXPORT
// ═══════════════════════════════════════════════
document.getElementById('export-btn').addEventListener('click', () => {
  if (!S.rawNotes) return;
  const payload = JSON.stringify({ notes: S.rawNotes }, null, 4);
  const blob = new Blob([payload], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'notes_edited.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  document.getElementById('status-msg').textContent = '✅ JSON 저장 완료!';
});

const TL_CANVAS_H = 55;   // each timeline canvas height

function resizeTimelines() {
  const totalW = tlTotalWidth();
  normalTlEl.width  = totalW;
  normalTlEl.height = TL_CANVAS_H;
  dragTlEl.width    = totalW;
  dragTlEl.height   = TL_CANVAS_H;
  // Let the inner div expand to fit canvases
  tlInner.style.minWidth = totalW + 'px';
}

function resizeAll() {
  noteCanvasEl.width  = noteWrapper.clientWidth;
  noteCanvasEl.height = noteWrapper.clientHeight;
  resizeTimelines();
  renderAll();
}

function renderAll() {
  renderNoteCanvas();
  renderNormalTimeline();
  renderDragTimeline();
}

window.addEventListener('resize', resizeAll);
resizeAll();

// ═══════════════════════════════════════════════
//  UTILITY: rounded rect
// ═══════════════════════════════════════════════
function roundRectPath(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}
function fillRoundRect(ctx, x, y, w, h, r) { roundRectPath(ctx, x, y, w, h, r); ctx.fill(); }
function strokeRoundRect(ctx, x, y, w, h, r) { roundRectPath(ctx, x, y, w, h, r); ctx.stroke(); }

  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf.buffer;
}

let tapEnabled         = false;
// Raw ArrayBuffers pre-loaded from embedded base64; decoded into AudioBuffers lazily on first play
const tapRawBuffers    = {
  normal: _b64ToArrayBuffer(SFX_B64.normal),
  long:   _b64ToArrayBuffer(SFX_B64.long),
  end:    _b64ToArrayBuffer(SFX_B64.end),
};
const tapBuffers       = { normal: null, long: null, end: null };
let   tapScheduled     = new Set();   // BufferSourceNode instances waiting to fire

// Decode raw buffers into AudioBuffers using the live audioCtxPb.
// Called just before scheduling so we always use the current context.
async function ensureTapBuffersDecoded() {
  if (!audioCtxPb) return;
  for (const key of Object.keys(tapRawBuffers)) {
    if (tapRawBuffers[key] && !tapBuffers[key]) {
      try {
        // slice(0) so the ArrayBuffer isn't neutered after decoding
        tapBuffers[key] = await audioCtxPb.decodeAudioData(tapRawBuffers[key].slice(0));
      } catch (_) { /* skip undecodable file */ }
    }
  }
}

// Toggle button
document.getElementById('tap-sound-btn').addEventListener('click', function () {
  tapEnabled = !tapEnabled;
  this.textContent = tapEnabled ? '🥁 탭음 ✓' : '🥁 탭음 ✗';
  this.classList.toggle('btn-success',   tapEnabled);
  this.classList.toggle('btn-secondary', !tapEnabled);
});

// Schedule tap sounds for all notes that haven't passed yet.
// Called inside startPlayback() after playStartAudioT is set.
function scheduleTapSounds() {
  if (!tapEnabled || !S.rawNotes || !audioCtxPb) return;

  // Collect unique times and their note types
  // (multiple notes at the same time → one tap, but use the "loudest" type priority)
  const TYPE_PRIORITY = { 1: 0, [-1]: 1, 0: 2, 2: 3 }; // lower = higher priority
  const timeMap = new Map(); // rounded-ms-key → { time, type }

  S.rawNotes.forEach(note => {
    if (note.time < playbackOffset) return;  // already past
    const key = note.time.toFixed(3);
    if (!timeMap.has(key)) {
      timeMap.set(key, { time: note.time, type: note.type });
    } else {
      const cur = timeMap.get(key);
      const curP = TYPE_PRIORITY[cur.type] ?? 99;
      const newP = TYPE_PRIORITY[note.type] ?? 99;
      if (newP < curP) timeMap.get(key).type = note.type;
    }
  });

  timeMap.forEach(({ time, type }) => {
    const buf = (type === 1)  ? tapBuffers.long
              : (type === -1) ? tapBuffers.end
              :                 tapBuffers.normal;
    if (!buf) return;

    const absTime = playStartAudioT + (time - playbackOffset);
    if (absTime < audioCtxPb.currentTime) return;  // already past (float rounding)

    const src = audioCtxPb.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtxPb.destination);
    src.start(absTime);
    // Auto-cleanup after fire so we don't leak references
    src.onended = () => { tapScheduled.delete(src); };
    tapScheduled.add(src);
  });
}

// Stop all pending tap sounds (called on stopPlayback)
function cancelTapSounds() {
  tapScheduled.forEach(src => {
    try { src.stop(); } catch (_) { /* already fired */ }
    src.disconnect();
  });
  tapScheduled = new Set();
}

// ═══════════════════════════════════════════════
//  MUSIC LOAD
// ═══════════════════════════════════════════════
document.getElementById('music-upload').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const statusEl = document.getElementById('music-status');
  statusEl.textContent = '로딩 중…';

  if (!audioCtxPb) audioCtxPb = new AudioContext();

  const reader = new FileReader();
  reader.onload = ev => {
    // decodeAudioData (Promise form) — slice(0) to hand over a separate copy
    audioCtxPb.decodeAudioData(ev.target.result.slice(0))
      .then(decoded => {
        audioBuffer     = decoded;
        playbackOffset  = 0;
        currentPlayTime = 0;
        statusEl.textContent = `🎵 ${file.name}`;
        document.getElementById('play-btn').disabled  = false;
        document.getElementById('reset-btn').disabled = false;
        document.getElementById('play-time').textContent = '0.00s';
      })
      .catch(err => {
        statusEl.textContent = '오류: ' + String(err);
      });
  };
  reader.readAsArrayBuffer(file);
});

// ═══════════════════════════════════════════════
//  PLAY / STOP / RESET
// ═══════════════════════════════════════════════
document.getElementById('play-btn').addEventListener('click', () => {
  if (!audioBuffer) return;
  if (isPlaying) stopPlayback(false);
  else           startPlayback();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  stopPlayback(true);
});

async function startPlayback() {
  if (!audioCtxPb) audioCtxPb = new AudioContext();
  if (audioCtxPb.state === 'suspended') await audioCtxPb.resume();

  // Decode tap-sound buffers BEFORE we capture playStartAudioT, so the
  // async work doesn't push early notes past their scheduled absTime.
  await ensureTapBuffersDecoded();

  audioSourceNode = audioCtxPb.createBufferSource();
  audioSourceNode.buffer = audioBuffer;
  audioSourceNode.connect(audioCtxPb.destination);
  audioSourceNode.onended = () => {
    if (isPlaying) stopPlayback(true);   // natural end → reset to start
  };

  playStartAudioT = audioCtxPb.currentTime;
  audioSourceNode.start(0, playbackOffset);
  isPlaying = true;

  scheduleTapSounds();

  const btn = document.getElementById('play-btn');
  btn.textContent = '■ 정지';
  btn.classList.remove('btn-success');
  btn.classList.add('btn-primary');

  playLoop();
}

function stopPlayback(resetToStart) {
  isPlaying = false;   // set before stop() so onended won't recurse

  cancelTapSounds();

  if (audioSourceNode) {
    try { audioSourceNode.stop(); } catch (_) { /* stop() throws if source never started */ }
    audioSourceNode.disconnect();
    audioSourceNode = null;
  }
  if (playRafId) { cancelAnimationFrame(playRafId); playRafId = null; }

  if (resetToStart) {
    playbackOffset  = 0;
    currentPlayTime = 0;
    document.getElementById('play-time').textContent = '0.00s';
  } else {
    playbackOffset = currentPlayTime;
  }

  const btn = document.getElementById('play-btn');
  btn.textContent = '▶ 재생';
  btn.classList.remove('btn-primary');
  btn.classList.add('btn-success');

  // Redraw editor view
  renderAll();
}

// ═══════════════════════════════════════════════
//  WHEEL SEEK
// ═══════════════════════════════════════════════
// Wheel on the play-time display seeks ±0.1 s per notch.
// Ctrl+Wheel anywhere on the note canvas or timeline also seeks.
const WHEEL_STEP = 0.1; // seconds per wheel notch

function seekByDelta(deltaSec) {
  if (!audioBuffer) return;
  const maxT  = audioBuffer.duration;
  const newT  = Math.max(0, Math.min(maxT, (isPlaying ? currentPlayTime : playbackOffset) + deltaSec));
  if (isPlaying) {
    // Stop, update offset, restart
    stopPlayback(false);
    playbackOffset  = newT;
    currentPlayTime = newT;
    document.getElementById('play-time').textContent = newT.toFixed(2) + 's';
    startPlayback();
  } else {
    playbackOffset  = newT;
    currentPlayTime = newT;
    document.getElementById('play-time').textContent = newT.toFixed(2) + 's';
    renderAll();
  }
}

document.getElementById('play-time').addEventListener('wheel', e => {
  // Handled by the document-level wheel listener above; nothing extra needed.
}, { passive: false });

// Shift+Wheel anywhere seeks (handled centrally in document wheel listener above)

function playLoop() {
  if (!isPlaying) return;

  currentPlayTime = (audioCtxPb.currentTime - playStartAudioT) + playbackOffset;
  document.getElementById('play-time').textContent = currentPlayTime.toFixed(2) + 's';

  // Auto-scroll timeline to keep playhead in view (left 30 % of viewport)
  const phX  = tlTimeToX(currentPlayTime);
  const visW = tlScroll.clientWidth;
  const targetScroll = phX - visW * 0.3;
  if (phX > tlScroll.scrollLeft + visW * 0.7 || phX < tlScroll.scrollLeft + visW * 0.1) {
    tlScroll.scrollLeft = Math.max(0, targetScroll);
  }

  renderPlaybackCanvas(currentPlayTime);
  renderNormalTimeline();
  renderDragTimeline();

  playRafId = requestAnimationFrame(playLoop);
}

// ═══════════════════════════════════════════════
//  PLAYBACK NOTE ALPHA HELPER
// ═══════════════════════════════════════════════
// Returns { alpha: 0-1, flash: 0-1 }
// flash > 0 only for long-note end effect (alpha will be 0 then)
function notePlayAlpha(note, t) {
  const nt  = note.time;
  // Treat as long note when type === 1 OR (type === -1 AND duration > 0)
  const dur = (note.type === 1 || (note.type === -1 && note.duration > 0))
    ? (note.duration || 0) : 0;

  if (dur > 0) {
    // ── Long note ──────────────────────────────
    const endT = nt + dur;
    if (t < nt - FADE_DUR)         return { alpha: 0, flash: 0 };
    if (t < nt)                    return { alpha: (t - (nt - FADE_DUR)) / FADE_DUR, flash: 0 };
    if (t < endT)                  return { alpha: 1, flash: 0 };
    if (t < endT + FLASH_DUR) {
      const fp = (t - endT) / FLASH_DUR;
      return { alpha: 0, flash: 1 - fp };
    }
    return { alpha: 0, flash: 0 };

  } else {
    // ── Normal / drag note ─────────────────────
    if (t < nt - FADE_DUR)         return { alpha: 0, flash: 0 };
    if (t < nt)                    return { alpha: (t - (nt - FADE_DUR)) / FADE_DUR, flash: 0 };
    if (t < nt + FADE_DUR)         return { alpha: 1 - (t - nt) / FADE_DUR, flash: 0 };
    return { alpha: 0, flash: 0 };
  }
}

// ═══════════════════════════════════════════════
//  PLAYBACK CANVAS RENDER
// ═══════════════════════════════════════════════
function renderPlaybackCanvas(t) {
  if (!S.rawNotes) return;

  const ctx = noteCtx;
  const W   = noteCanvasEl.width;
  const H   = noteCanvasEl.height;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#060f1a';
  ctx.fillRect(0, 0, W, H);
  drawGrid(ctx, W, H);

  // ── Draw drag-chain connector lines (below note circles) ───────
  S.dragChains.forEach(chain => {
    const notes = chain.notes;
    for (let i = 0; i < notes.length - 1; i++) {
      const nA = notes[i];
      const nB = notes[i + 1];
      const tA = nA.time;
      const tB = nB.time;

      // Skip if entirely outside visible window
      if (t < tA - FADE_DUR || t > tB + FADE_DUR) continue;

      // headP: fraction of line drawn from A toward B  (grows tA → tB)
      const tSpan = tB - tA;
      const headP = tSpan > 0.001
        ? Math.min(1, Math.max(0, (t - tA) / tSpan)) : 1;

      // tailP: fraction of line that has already vanished from A  (grows tA → tB+FADE_DUR)
      const vanishSpan = tB + FADE_DUR - tA;
      const tailP = vanishSpan > 0.001
        ? Math.min(1, Math.max(0, (t - tA) / vanishSpan)) : 1;

      if (headP <= tailP) continue;  // nothing to draw

      const [ax, ay] = worldToCanvas(nA.position.x, nA.position.y);
      const [bx, by] = worldToCanvas(nB.position.x, nB.position.y);

      const startX = ax + (bx - ax) * tailP;
      const startY = ay + (by - ay) * tailP;
      const endX   = ax + (bx - ax) * headP;
      const endY   = ay + (by - ay) * headP;

      // Line opacity: fade with the higher-alpha endpoint
      const alphaA = notePlayAlpha(nA, t).alpha;
      const alphaB = notePlayAlpha(nB, t).alpha;
      const lineAlpha = Math.max(alphaA, alphaB);

      ctx.save();
      ctx.globalAlpha = lineAlpha * 0.75;
      ctx.strokeStyle = '#ffa726';
      ctx.lineWidth   = 2.5;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(endX, endY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  });

  // ── Draw all note circles ───────────────────────────────────────
  S.rawNotes.forEach(note => {
    const { alpha, flash } = notePlayAlpha(note, t);
    if (alpha <= 0 && flash <= 0) return;

    const [cx, cy] = worldToCanvas(note.position.x, note.position.y);
    const color    = noteColor(note.type);

    if (flash > 0) {
      // Long-note end flash: expanding bright ring
      ctx.save();
      ctx.globalAlpha = flash * 0.9;
      ctx.shadowColor = color;
      ctx.shadowBlur  = 50 * flash;
      ctx.beginPath();
      ctx.arc(cx, cy, NOTE_R * (1 + flash * 2), 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.restore();
      return;
    }

    if (alpha <= 0) return;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = color;
    ctx.shadowBlur  = 14;
    ctx.beginPath();
    ctx.arc(cx, cy, NOTE_R, 0, Math.PI * 2);
    ctx.fillStyle   = color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();
    ctx.restore();

    // At-peak glow ring (alpha near 1 for normal notes, or while holding for long)
    if (alpha > 0.95) {
      ctx.save();
      ctx.globalAlpha = (alpha - 0.95) / 0.05 * 0.4;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth   = 2;
      ctx.shadowColor = color;
      ctx.shadowBlur  = 20;
      ctx.beginPath();
      ctx.arc(cx, cy, NOTE_R + 6, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  });

  // ── Overlay: current time ───────────────────────────────────────
  ctx.fillStyle = 'rgba(10,22,40,0.75)';
  ctx.fillRect(0, 0, W, 22);
  ctx.fillStyle = '#64b5f6';
  ctx.font      = '11px Segoe UI';
  ctx.textAlign = 'left';
  ctx.fillText(`▶  ${t.toFixed(3)} s`, 10, 15);
}

// ═══════════════════════════════════════════════
//  PLAYHEAD HELPER  (called from timeline renders)
// ═══════════════════════════════════════════════
function drawPlayhead(ctx, W, H) {
  if (currentPlayTime <= 0 && !isPlaying) return;
  const phX = tlTimeToX(currentPlayTime);
  if (phX < 0 || phX > W) return;

  ctx.save();
  ctx.strokeStyle = '#ff4444';
  ctx.lineWidth   = 2;
  ctx.shadowColor = '#ff6666';
  ctx.shadowBlur  = 6;
  ctx.beginPath();
  ctx.moveTo(phX, 0);
  ctx.lineTo(phX, H);
  ctx.stroke();

  // Small triangle cap at top
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.moveTo(phX, 0);
  ctx.lineTo(phX - 5, 6);
  ctx.lineTo(phX + 5, 6);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}
